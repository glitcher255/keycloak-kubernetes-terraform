name: Teardown Infra
on:
  workflow_dispatch:
jobs:
  deploy:
    name: 'Teardown Infrastructure'
    runs-on: ubuntu-latest
    env:
      #GitHub auth with Terraform cloud used in "provider.tf" # Address is app.terraform.io becomes app_terraform.io. (must be prefixed with "TF_TOKEN_")
      ##########################################################################
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_app_terraform_io }}
      ##########################################################################

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Make Script Executable
        run: chmod +x scripts/teardown.sh

      - name: Run teardown Script
        run: ./scripts/teardown.sh